AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: LabLumen AI processing pipeline (S3 -> Textract -> Bedrock -> pgvector)

# Deployment model: Terraform owns the S3 bucket, IAM execution role, Lambda security group,
# and VPC. SAM owns the Lambda function and its CloudWatch log group.
# DATABASE_URL is NOT a parameter here — db.py reads it from Secrets Manager at runtime.

Parameters:
  ReportsBucketName:
    Type: String
    Description: Name of the Terraform-managed reports S3 bucket (trigger source).

  ExecutionRoleArn:
    Type: String
    Description: ARN of the Terraform-managed Lambda execution role (lablumen-ai-lambda-exec).

  SubnetIds:
    Type: String
    Description: Comma-separated list of private subnet IDs where the Lambda will run (must reach RDS).

  SecurityGroupId:
    Type: String
    Description: ID of the Lambda security group (egress 5432 to RDS, 443 to AWS APIs).

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 512

Resources:
  AiProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src.handler.lambda_handler
      # Execution role is Terraform-managed (Textract + Bedrock + S3 + SM + VPC ENI perms).
      Role: !Ref ExecutionRoleArn
      VpcConfig:
        SubnetIds: !Split [",", !Ref SubnetIds]
        SecurityGroupIds:
          - !Ref SecurityGroupId
      Environment:
        Variables:
          # Secret ID that db.py reads at cold start from Secrets Manager.
          DATABASE_SECRET_ID: lablumen/app/database-url
          BEDROCK_EMBED_MODEL_ID: amazon.titan-embed-text-v1
          # Nova Lite v1 is the ONLY on-demand text model permitted under org SCP p-rn6vr8ok.
          BEDROCK_TEXT_MODEL_ID: amazon.nova-lite-v1:0
      Events:
        ReportUploaded:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref ReportsBucketName

Outputs:
  FunctionArn:
    Description: ARN of the deployed AI processing Lambda.
    Value: !GetAtt AiProcessingFunction.Arn
  FunctionName:
    Description: Name of the deployed AI processing Lambda.
    Value: !Ref AiProcessingFunction

